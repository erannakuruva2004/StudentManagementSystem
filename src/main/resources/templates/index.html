<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Premium Student Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
            min-height:100vh;
            padding:40px;
            color:white;
        }

        .main-card{
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius:25px;
            padding:35px;
            box-shadow:0 8px 32px rgba(0,0,0,0.35);
            border:1px solid rgba(255,255,255,0.15);
        }

        .title{
            font-size:38px;
            font-weight:700;
            margin-bottom:30px;
            text-align:center;
            color:#fff;
        }

        .form-control{
            height:55px;
            border-radius:14px;
            border:none;
            padding-left:18px;
            background:rgba(255,255,255,0.12);
            color:white;
            font-size:15px;
        }

        .form-control::placeholder{
            color:#d1d5db;
        }

        .form-control:focus{
            background:rgba(255,255,255,0.18);
            color:white;
            box-shadow:none;
            border:1px solid #60a5fa;
        }

        .btn-custom{
            background:linear-gradient(135deg,#3b82f6,#2563eb);
            border:none;
            width:100%;
            height:55px;
            border-radius:14px;
            color:white;
            font-weight:600;
            font-size:17px;
            transition:0.3s;
        }

        .btn-custom:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(37,99,235,0.5);
        }

        .table-container{
            margin-top:40px;
            overflow:hidden;
            border-radius:20px;
        }

        .table{
            margin-bottom:0;
            overflow:hidden;
            border-radius:20px;
        }

        .table thead{
            background:#2563eb;
            color:white;
        }

        .table tbody tr{
            background:rgba(255,255,255,0.08);
            color:white;
            transition:0.3s;
        }

        .table tbody tr:hover{
            background:rgba(255,255,255,0.16);
            transform:scale(1.01);
        }

        .table td,
        .table th{
            padding:18px;
            vertical-align:middle;
            border:none;
        }

        .delete-btn{
            background:linear-gradient(135deg,#ef4444,#dc2626);
            border:none;
            border-radius:10px;
            padding:8px 16px;
            color:white;
            text-decoration:none;
            transition:0.3s;
        }

        .delete-btn:hover{
            background:#b91c1c;
            color:white;
        }

        .icon-box{
            width:75px;
            height:75px;
            background:rgba(255,255,255,0.12);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:auto;
            margin-bottom:20px;
            font-size:32px;
            color:#60a5fa;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="main-card">

        <div class="icon-box">
            <i class="bi bi-mortarboard-fill"></i>
        </div>

        <h1 class="title">
            Student Management System
        </h1>

        <!-- FORM -->

        <form action="/save"
              method="post"
              th:object="${student}">

            <div class="row">

                <div class="col-md-4 mb-3">
                    <input type="text"
                           th:field="*{name}"
                           placeholder="Enter Student Name"
                           class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <input type="email"
                           th:field="*{email}"
                           placeholder="Enter Email Address"
                           class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <input type="text"
                           th:field="*{course}"
                           placeholder="Enter Course"
                           class="form-control">
                </div>

            </div>

            <button class="btn btn-custom mt-3">
                <i class="bi bi-plus-circle"></i>
                Add Student
            </button>

        </form>

        <!-- TABLE -->

        <div class="table-container">

            <table class="table">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>
                        <i class="bi bi-person-fill"></i>
                        Name
                    </th>
                    <th>
                        <i class="bi bi-envelope-fill"></i>
                        Email
                    </th>
                    <th>
                        <i class="bi bi-book-fill"></i>
                        Course
                    </th>
                    <th>
                        <i class="bi bi-gear-fill"></i>
                        Action
                    </th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="s : ${students}">

                    <td th:text="${s.id}"></td>

                    <td th:text="${s.name}"></td>

                    <td th:text="${s.email}"></td>

                    <td th:text="${s.course}"></td>

                    <td>
                        <a th:href="@{/delete/{id}(id=${s.id})}"
                           class="delete-btn">

                            <i class="bi bi-trash-fill"></i>
                            Delete

                        </a>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
